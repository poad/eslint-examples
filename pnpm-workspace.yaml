packages:
  - ./non-react
  - ./react-based/*
  - ./aws-cdk
  - ./aws-cdk-vitest

allowBuilds:
  esbuild: false
  sharp: false
  unrs-resolver: false

blockExoticSubdeps: true

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - postcss@8.5.10
  - eslint@10.4.0

overrides:
  eslint-import-resolver-typescript: '^4.4.4'
  next@>=16.0.0 <16.2.6: ^16.2.6
  postcss@<8.5.10: ^8.5.10
  semver: '>=7'

  eslint: ^10.4.0

trustPolicy: no-downgrade
