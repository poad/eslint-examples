packages:
  - ./non-react
  - ./react-based/*
  - ./aws-cdk
  - ./aws-cdk-vitest

allowBuilds:
  esbuild: false
  sharp: false
  unrs-resolver: false

blockExoticSubdeps: true

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - pnpm@11.9.0
  - postcss@8.5.10
  - js-yaml@3.15.0

overrides:
  eslint-import-resolver-typescript: '^4.4.5'
  js-yaml@<3.15.0: ^3.15.0
  postcss@<8.5.10: ^8.5.10
  semver: '>=7'

trustPolicy: no-downgrade
